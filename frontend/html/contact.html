<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../favicon/icon.png" />
  <title>Contact — Saneed</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <style>
    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-family: var(--font-display); font-size: 0.78rem;
      color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .field input, .field textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border-hi);
      border-radius: var(--radius); padding: 12px 14px; color: var(--text); font-family: var(--font-body);
      font-size: 0.95rem;
    }
    .field textarea { min-height: 140px; resize: vertical; }
    .field input::placeholder, .field textarea::placeholder { color: var(--text-dim); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand"><span class="dot"></span>SANEED.LOG</a>
      <div class="navbar-links">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </div>
      <button class="navbar-toggle" aria-label="Toggle menu">☰</button>
    </div>
  </nav>

  <section class="section">
    <div class="container" style="max-width: 560px;">
      <div class="eyebrow">Get in touch</div>
      <h1 style="margin: 12px 0 24px;">Send a message.</h1>
      <p style="margin-bottom: 32px;">
        This form doesn't submit yet — wiring it to the Django backend (a
        <code class="mono">/api/contact/</code> endpoint) is the next step.
      </p>
      <form id="contact-form">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send message</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <span class="footer-meta">© 2026 · Portfolio compiled from IDX/01–08</span>
      <div class="footer-links">
        <a href="https://github.com/saneedkhani">GitHub</a>
        <a href="https://www.linkedin.com/in/saneed-ullah-7596352a4/">LinkedIn</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Form wiring to the Django backend comes next — not connected yet.');
    });
  </script>
</body>
</html>
